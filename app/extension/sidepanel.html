<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Consistency Side Panel</title>
  <style>
    /* Neobrutalist styling rules */
    body {
      margin: 0;
      padding: 16px;
      font-family: "Courier New", Courier, monospace, sans-serif;
      background-color: #ffde47;
      color: #000000;
      box-sizing: border-box;
    }

    h1 {
      font-size: 22px;
      margin: 0 0 16px 0;
      text-transform: uppercase;
      border: 3px solid #000000;
      background-color: #ffffff;
      padding: 12px;
      box-shadow: 6px 6px 0px 0px #000000;
      text-align: center;
    }

    .card {
      border: 3px solid #000000;
      background-color: #ffffff;
      padding: 12px;
      box-shadow: 4px 4px 0px 0px #000000;
      margin-bottom: 16px;
    }

    .card-title {
      font-weight: bold;
      text-transform: uppercase;
      margin-bottom: 8px;
      border-bottom: 2px solid #000000;
      padding-bottom: 4px;
      font-size: 13px;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 4px;
      text-transform: uppercase;
      font-size: 11px;
    }

    input[type="text"] {
      width: calc(100% - 18px);
      padding: 6px;
      border: 3px solid #000000;
      font-family: inherit;
      font-weight: bold;
      margin-bottom: 12px;
    }

    input[type="text"]:focus {
      outline: none;
      background-color: #e6ffff;
    }

    .btn {
      width: 100%;
      padding: 12px;
      font-family: inherit;
      font-weight: bold;
      text-transform: uppercase;
      cursor: pointer;
      border: 3px solid #000000;
      background-color: #ff5252;
      color: #ffffff;
      box-shadow: 4px 4px 0px 0px #000000;
      transition: all 0.1s ease;
      font-size: 14px;
      margin-bottom: 16px;
    }

    .btn:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0px 0px #000000;
    }

    .btn.active {
      background-color: #2ed573;
      color: #ffffff;
    }

    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
      font-weight: bold;
    }

    .badge {
      display: inline-block;
      padding: 2px 6px;
      border: 2px solid #000000;
      text-transform: uppercase;
      font-size: 10px;
    }

    .badge.connected {
      background-color: #2ed573;
      color: #ffffff;
    }

    .badge.disconnected {
      background-color: #ff5252;
      color: #ffffff;
    }

    /* Live Feed list items */
    .feed-container {
      margin-top: 16px;
    }

    .feed-title {
      font-size: 18px;
      font-weight: bold;
      text-transform: uppercase;
      margin-bottom: 12px;
      border: 3px solid #000000;
      background-color: #ffffff;
      padding: 6px;
      display: inline-block;
      box-shadow: 3px 3px 0px 0px #000000;
    }

    .log-item {
      border: 3px solid #000000;
      background-color: #ffffff;
      padding: 12px;
      margin-bottom: 12px;
      box-shadow: 4px 4px 0px 0px #000000;
    }

    .log-header {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: #555555;
      font-weight: bold;
      border-bottom: 1px dashed #000000;
      padding-bottom: 4px;
      margin-bottom: 6px;
    }

    .log-text {
      font-size: 12px;
      line-height: 1.4;
      font-weight: bold;
    }

    /* Verdict reports */
    .verdict-box {
      margin-top: 8px;
      padding: 8px;
      border: 2px solid #000000;
      font-size: 11px;
    }

    .verdict-box.contradiction {
      background-color: #ff5252;
      color: #ffffff;
    }

    .verdict-box.consistent {
      background-color: #2ed573;
      color: #ffffff;
    }

    .verdict-box.neutral {
      background-color: #f1f2f6;
      color: #000000;
    }

    .verdict-title {
      font-weight: bold;
      text-transform: uppercase;
      font-size: 10px;
      margin-bottom: 4px;
      border-bottom: 1px solid currentColor;
      padding-bottom: 2px;
    }

    .verdict-details {
      margin-top: 4px;
      line-height: 1.3;
    }

    .verdict-explanation {
      margin-top: 4px;
      font-style: italic;
      border-top: 1px dotted currentColor;
      padding-top: 4px;
    }

    .empty-state {
      text-align: center;
      padding: 24px;
      border: 3px dashed #000000;
      background-color: #ffffff;
      color: #555555;
      font-style: italic;
      font-size: 12px;
      box-shadow: 4px 4px 0px 0px #000000;
    }
  </style>
</head>
<body>
  <h1>Claim Check</h1>

  <div class="card">
    <div class="card-title">Setup</div>
    <label for="ws-url">WebSocket URL</label>
    <input type="text" id="ws-url" value="ws://localhost:8000/ws/live-speech">
    
    <div class="status-bar">
      <span>Service State:</span>
      <span id="status-badge" class="badge disconnected">Disconnected</span>
    </div>
  </div>

  <button id="toggle-btn" class="btn">Connect & Listen</button>

  <div class="feed-container">
    <div class="feed-title">Live Analysis Feed</div>
    <div id="feed-list">
      <div class="empty-state">No statements parsed yet. Connect the WebSocket and start playing a broadcast.</div>
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
