<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Consistency Tracker</title>
  <style>
    /* Neobrutalist design system */
    body {
      width: 320px;
      margin: 0;
      padding: 16px;
      font-family: "Courier New", Courier, monospace, sans-serif;
      background-color: #ffde47;
      color: #000000;
    }

    h1 {
      font-size: 22px;
      margin: 0 0 16px 0;
      text-transform: uppercase;
      border: 3px solid #000000;
      background-color: #ffffff;
      padding: 8px;
      box-shadow: 4px 4px 0px 0px #000000;
    }

    .card {
      border: 3px solid #000000;
      background-color: #ffffff;
      padding: 12px;
      box-shadow: 4px 4px 0px 0px #000000;
      margin-bottom: 16px;
    }

    .card-title {
      font-weight: bold;
      text-transform: uppercase;
      margin-bottom: 8px;
      border-bottom: 2px solid #000000;
      padding-bottom: 4px;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 4px;
      text-transform: uppercase;
      font-size: 11px;
    }

    input[type="text"] {
      width: calc(100% - 14px);
      padding: 6px;
      border: 3px solid #000000;
      font-family: inherit;
      font-weight: bold;
      margin-bottom: 12px;
    }

    input[type="text"]:focus {
      outline: none;
      background-color: #e6ffff;
    }

    .btn {
      width: 100%;
      padding: 10px;
      font-family: inherit;
      font-weight: bold;
      text-transform: uppercase;
      cursor: pointer;
      border: 3px solid #000000;
      background-color: #ff5252;
      color: #ffffff;
      box-shadow: 4px 4px 0px 0px #000000;
      transition: all 0.1s ease;
    }

    .btn:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0px 0px #000000;
    }

    .btn.active {
      background-color: #2ed573;
      color: #ffffff;
    }

    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
      font-weight: bold;
    }

    .badge {
      display: inline-block;
      padding: 2px 6px;
      border: 2px solid #000000;
      text-transform: uppercase;
      font-size: 10px;
    }

    .badge.connected {
      background-color: #2ed573;
      color: #ffffff;
    }

    .badge.disconnected {
      background-color: #ff5252;
      color: #ffffff;
    }

    .log-list {
      max-height: 120px;
      overflow-y: auto;
      font-size: 11px;
      padding-left: 0;
      margin: 0;
      list-style-type: none;
    }

    .log-item {
      padding: 6px;
      border-bottom: 2px solid #000000;
    }

    .log-item:last-child {
      border-bottom: none;
    }
  </style>
</head>
<body>
  <h1>Claim Check</h1>

  <div class="card">
    <div class="card-title">Configuration</div>
    <label for="ws-url">WebSocket Endpoint</label>
    <input type="text" id="ws-url" value="ws://localhost:8000/ws/live-speech">
    
    <div class="status-bar">
      <span>Status:</span>
      <span id="status-badge" class="badge disconnected">Disconnected</span>
    </div>
  </div>

  <button id="toggle-btn" class="btn">Connect & Listen</button>

  <div class="card" style="margin-top: 16px;">
    <div class="card-title">Live Transcript Feed</div>
    <ul id="log-feed" class="log-list">
      <li style="color: #777; font-style: italic;">No statements captured yet. Start listening...</li>
    </ul>
  </div>

  <script src="popup.js"></script>
</body>
</html>
